  description: "Coupe le son strictement (pas un toggle). Necessite pycaw : pip install winboost[audio]."
  category: "appearance"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "powershell"
    params:
      command: "python -c \"from winboost.utils.audio_native import set_mute; set_mute(True)\""
  rollback:
    method: "powershell"
    params:
      command: "python -c \"from winboost.utils.audio_native import set_mute; set_mute(False)\""
