- id: "app_003"
  name: "Remove Show More Options (Win11 Classic Context Menu)"
  description: "Removes the 'Show more options' entry in Windows 11 context menu by restoring the classic full context menu"
  category: "appearance"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "registry_set"
    params:
      path: "HKCU\\SOFTWARE\\Classes\\CLSID\\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}\\InprocServer32"
      values:
        - name: "(Default)"
          type: "REG_SZ"
          data: ""
  rollback:
    method: "registry_delete"
    params:
      path: "HKCU\\SOFTWARE\\Classes\\CLSID\\{86ca1aa0-34aa-4e8b-a509-50c905bae2a2}"
      recursive: true
  keywords:
    fr: ["menu contextuel classique", "afficher plus options", "clic droit complet", "ancien menu"]
    en: ["show more options", "classic context menu", "full right click", "old context menu"]

