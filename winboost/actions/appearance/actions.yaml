    params:
      command: "(New-Object -ComObject WScript.Shell).SendKeys([char]173)"
  keywords:
    fr: ["unmute", "reactiver son", "remettre son", "demuter", "remettre le son"]
    en: ["unmute", "restore sound", "enable volume", "turn sound on"]

- id: "app_013"
  name: "Volume Set Low (20%)"
  description: "Baisse le volume systeme a environ 20% via SendKeys (50 down puis 10 up)"
  category: "appearance"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "powershell"
    params:
      command: "$wshell = New-Object -ComObject WScript.Shell; 1..50 | %{$wshell.SendKeys([char]174)}; 1..10 | %{$wshell.SendKeys([char]175)}"
  rollback:
    method: "powershell"
    params:
      command: "$wshell = New-Object -ComObject WScript.Shell; 1..50 | %{$wshell.SendKeys([char]174)}; 1..25 | %{$wshell.SendKeys([char]175)}"
  keywords:
    fr: ["volume bas", "baisser volume", "volume faible", "20 pourcent", "volume doux"]
    en: ["low volume", "lower volume", "quiet volume", "20 percent volume", "soft volume"]

