# WinBoost — Actions: Appearance
# 10 actions de personnalisation visuelle Windows

- id: "app_001"
  name: "Enable Dark Mode"
  description: "Switches Windows system theme to dark mode for apps and system UI"
  category: "appearance"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "registry_set"
    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
      values:
        - name: "AppsUseLightTheme"
          type: "REG_DWORD"
          data: 0
        - name: "SystemUsesLightTheme"
          type: "REG_DWORD"
          data: 0
  rollback:
    method: "registry_set"
    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
      values:
        - name: "AppsUseLightTheme"
          type: "REG_DWORD"
          data: 1
        - name: "SystemUsesLightTheme"
          type: "REG_DWORD"
          data: 1
  keywords:
    fr: ["mode sombre", "theme noir", "dark mode", "apparence sombre"]
    en: ["dark mode", "dark theme", "night mode", "black theme"]

