- id: "app_011"
  name: "Mute System Volume"
  description: "Coupe le son du systeme via la touche virtuelle Mute (toggle)"
  category: "appearance"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "powershell"
    params:
      command: "(New-Object -ComObject WScript.Shell).SendKeys([char]173)"
  rollback:
    method: "powershell"
    params:
      command: "(New-Object -ComObject WScript.Shell).SendKeys([char]173)"
  keywords:
    fr: ["mute", "couper son", "silence", "volume zero", "muet", "couper le son"]
    en: ["mute", "mute volume", "silence", "no sound", "volume zero"]

- id: "app_012"
  name: "Unmute System Volume"
  description: "Reactive le son du systeme via la touche virtuelle Mute (toggle idempotent)"
  category: "appearance"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "powershell"
    params:
      command: "(New-Object -ComObject WScript.Shell).SendKeys([char]173)"
  rollback:
