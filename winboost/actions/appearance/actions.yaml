- id: "app_018"
  name: "Disable Animations"
  description: "Desactive les animations Windows (minimiser/maximiser + visual effects) pour gain de perf"
  category: "appearance"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "powershell"
    params:
      command: "Set-ItemProperty -Path 'HKCU:\\Control Panel\\Desktop\\WindowMetrics' -Name 'MinAnimate' -Value '0' -Type String; New-Item -Path 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects' -Force | Out-Null; Set-ItemProperty -Path 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects' -Name 'VisualFXSetting' -Value 2 -Type DWord"
  rollback:
    method: "powershell"
    params:
      command: "Set-ItemProperty -Path 'HKCU:\\Control Panel\\Desktop\\WindowMetrics' -Name 'MinAnimate' -Value '1' -Type String; Set-ItemProperty -Path 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects' -Name 'VisualFXSetting' -Value 0 -Type DWord"
  keywords:
    fr: ["desactiver animations", "stop animations", "perf windows", "windows fluide", "couper animations", "windows rapide"]
    en: ["disable animations", "stop animations", "performance windows", "fluid windows", "no animations", "faster windows"]

- id: "app_019"
  name: "Enable Animations"
  description: "Reactive les animations Windows (minimiser/maximiser + visual effects par defaut)"
  category: "appearance"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "powershell"
    params:
      command: "Set-ItemProperty -Path 'HKCU:\\Control Panel\\Desktop\\WindowMetrics' -Name 'MinAnimate' -Value '1' -Type String; Set-ItemProperty -Path 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects' -Name 'VisualFXSetting' -Value 0 -Type DWord"
  rollback:
    method: "powershell"
    params:
      command: "Set-ItemProperty -Path 'HKCU:\\Control Panel\\Desktop\\WindowMetrics' -Name 'MinAnimate' -Value '0' -Type String; Set-ItemProperty -Path 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects' -Name 'VisualFXSetting' -Value 2 -Type DWord"
  keywords:
    fr: ["activer animations", "remettre animations", "animations windows", "restaurer animations"]
    en: ["enable animations", "restore animations", "windows animations", "turn on animations"]

- id: "app_020"
