# ============================================================
# 17-20 : Caches divers (corbeille, miniatures, polices, DNS)
# ============================================================

- id: "clean_017"
  name: "Empty Recycle Bin"
  description: "Vide la corbeille Windows de tous les utilisateurs"
  category: "cleanup"
  risk_level: "low"
  requires_admin: false
  reversible: false
  execute:
    method: "powershell"
    params:
      command: "Clear-RecycleBin -Force -ErrorAction SilentlyContinue"
  rollback: {}
  keywords:
    fr: ["corbeille", "vider corbeille", "recycle bin", "poubelle"]
    en: ["recycle bin", "empty recycle bin", "trash", "clear recycle bin"]

- id: "clean_018"
  name: "Clear thumbnail cache"
  description: "Supprime le cache de miniatures (thumbcache) pour forcer la regeneration des aperçus"
  category: "cleanup"
  risk_level: "low"
  requires_admin: false
  reversible: false
  execute:
    method: "clear_directory"
    params:
      path: "%LOCALAPPDATA%\\Microsoft\\Windows\\Explorer"
      pattern: "thumbcache_*.db"
      recursive: false
  rollback: {}
  keywords:
    fr: ["miniatures", "cache miniatures", "thumbcache", "apercu images"]
    en: ["thumbnail", "thumbnail cache", "thumbcache", "image preview cache"]

- id: "clean_019"
  name: "Clear font cache"
  description: "Supprime le cache des polices Windows et redemarre le service FontCache"
  category: "cleanup"
  risk_level: "low"
  requires_admin: true
  reversible: false
  execute:
    method: "powershell"
    params:
      command: "Stop-Service -Name FontCache -Force -ErrorAction SilentlyContinue; Remove-Item -Path 'C:\\Windows\\ServiceProfiles\\LocalService\\AppData\\Local\\FontCache\\*' -Force -Recurse -ErrorAction SilentlyContinue; Start-Service -Name FontCache"
  rollback: {}
  keywords:
    fr: ["cache polices", "font cache", "polices", "reinitialiser polices"]
    en: ["font cache", "clear fonts", "font cache rebuild", "reset font cache"]

- id: "clean_020"
  name: "Flush DNS cache"
  description: "Vide le cache DNS local de Windows pour forcer la resolution DNS fraiche"
  category: "cleanup"
  risk_level: "low"
  requires_admin: true
  reversible: false
  execute:
    method: "cmd"
    params:
      command: "ipconfig /flushdns"
  rollback: {}
  keywords:
    fr: ["dns", "cache dns", "vider dns", "flush dns", "resolution dns"]
    en: ["dns", "dns cache", "flush dns", "clear dns", "dns resolver cache"]
