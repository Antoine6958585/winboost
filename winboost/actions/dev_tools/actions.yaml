# --- IDEs / Editeurs ---

- id: "dev_017"
  name: "Clear VS Code cache"
  description: "Supprime les fichiers de cache de Visual Studio Code"
  category: "dev_tools"
  risk_level: "low"
  requires_admin: false
  reversible: false
  execute:
    method: "clear_directory"
    params:
      path: "%APPDATA%\\Code\\Cache"
  rollback: {}
  keywords:
    fr: ["vscode", "visual studio code", "cache", "editeur", "nettoyage"]
    en: ["vscode", "visual studio code", "cache", "editor", "cleanup"]

- id: "dev_018"
  name: "Clear JetBrains IDE caches"
  description: "Supprime les caches locaux des IDEs JetBrains (IntelliJ, PyCharm, WebStorm, etc.)"
  category: "dev_tools"
  risk_level: "low"
  requires_admin: false
  reversible: false
  execute:
    method: "powershell"
    params:
      command: "Get-ChildItem -Path \"$env:LOCALAPPDATA\\JetBrains\" -Directory -ErrorAction SilentlyContinue | ForEach-Object { $cachePath = Join-Path $_.FullName 'cache'; if (Test-Path $cachePath) { Remove-Item -Path \"$cachePath\\*\" -Recurse -Force -ErrorAction SilentlyContinue } }"
  rollback: {}
  keywords:
    fr: ["jetbrains", "intellij", "pycharm", "webstorm", "cache", "ide", "nettoyage"]
    en: ["jetbrains", "intellij", "pycharm", "webstorm", "cache", "ide", "cleanup"]

