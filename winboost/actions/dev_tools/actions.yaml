- id: "dev_007"
  name: "Clean __pycache__ directories"
  description: "Supprime tous les dossiers __pycache__ du profil utilisateur"
  category: "dev_tools"
  risk_level: "low"
  requires_admin: false
  reversible: false
  execute:
    method: "powershell"
    params:
      command: "Get-ChildItem -Path $env:USERPROFILE -Recurse -Directory -Filter '__pycache__' -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue"
  rollback: {}
  keywords:
    fr: ["pycache", "python", "bytecode", "nettoyage", "dossiers"]
    en: ["pycache", "python", "bytecode", "cleanup", "directories"]

- id: "dev_008"
  name: "Clean .pyc files"
  description: "Supprime les fichiers bytecode Python (.pyc) du profil utilisateur"
