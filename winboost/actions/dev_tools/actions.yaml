    params:
      command: "Get-ChildItem -Path $env:USERPROFILE -Recurse -Filter '*.pyc' -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue"
  rollback: {}
  keywords:
    fr: ["pyc", "python", "bytecode", "fichiers", "nettoyage"]
