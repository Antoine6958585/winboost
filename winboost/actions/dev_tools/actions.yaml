# Actions de nettoyage des outils de developpement Windows
# Categorie : dev_tools | 20 actions | Risque : low

# --- JavaScript / Node.js ---

- id: "dev_001"
  name: "Clear npm cache"
  description: "Supprime le cache npm local pour liberer de l'espace disque"
  category: "dev_tools"
  risk_level: "low"
  requires_admin: false
  reversible: false
  execute:
    method: "cmd"
    params:
      command: "npm cache clean --force"
  rollback: {}
  keywords:
    fr: ["npm", "cache", "node", "javascript", "nettoyage"]
    en: ["npm", "cache", "node", "javascript", "cleanup"]

- id: "dev_002"
  name: "Clear Yarn cache"
  description: "Supprime le cache global Yarn pour recuperer de l'espace"
  category: "dev_tools"
  risk_level: "low"
  requires_admin: false
  reversible: false
  execute:
    method: "cmd"
    params:
      command: "yarn cache clean --all"
  rollback: {}
  keywords:
    fr: ["yarn", "cache", "javascript", "nettoyage", "node"]
    en: ["yarn", "cache", "javascript", "cleanup", "node"]

- id: "dev_003"
  name: "Clear pnpm store"
  description: "Nettoie le store global pnpm et les paquets orphelins"
  category: "dev_tools"
  risk_level: "low"
  requires_admin: false
  reversible: false
  execute:
    method: "cmd"
    params:
      command: "pnpm store prune"
  rollback: {}
  keywords:
    fr: ["pnpm", "store", "cache", "javascript", "nettoyage"]
    en: ["pnpm", "store", "cache", "javascript", "cleanup"]

- id: "dev_004"
  name: "Clear Bun cache"
  description: "Supprime le cache global de Bun dans AppData"
  category: "dev_tools"
  risk_level: "low"
  requires_admin: false
