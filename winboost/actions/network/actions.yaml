- id: "net_020"
  name: "Disable Network Discovery (Firewall)"
  description: "Desactive la regle pare-feu Network Discovery pour cacher la machine sur le reseau local"
  category: "network"
  risk_level: "low"
  requires_admin: true
  reversible: true
  execute:
    method: "cmd"
    params:
      command: "netsh advfirewall firewall set rule group=\"Network Discovery\" new enable=No"
  rollback:
    method: "cmd"
    params:
      command: "netsh advfirewall firewall set rule group=\"Network Discovery\" new enable=Yes"
  keywords:
    fr: ["cacher PC reseau", "decouverte reseau off", "invisible reseau local", "desactiver decouverte", "découverte réseau"]
    en: ["hide PC on network", "network discovery off", "invisible on LAN", "disable discovery"]
