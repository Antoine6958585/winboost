- id: "net_018"
  name: "Disable IPv6 (Registry)"
  description: "Desactive IPv6 sur toutes les interfaces via le registre (DisabledComponents=0xFF). Peut casser certaines apps locales utilisant IPv6."
  category: "network"
  risk_level: "medium"
  requires_admin: true
  reversible: true
  execute:
    method: "registry_set"
    params:
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip6\\Parameters"
      values:
        - name: "DisabledComponents"
          type: "REG_DWORD"
          data: 255
  rollback:
    method: "registry_set"
    params:
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip6\\Parameters"
      values:
        - name: "DisabledComponents"
          type: "REG_DWORD"
          data: 0
  keywords:
    fr: ["desactiver ipv6", "couper ipv6", "ipv6 off", "forcer ipv4", "désactiver ipv6"]
    en: ["disable ipv6", "ipv6 off", "turn off ipv6", "force ipv4"]

- id: "net_019"
  name: "Enable IPv6 (Registry)"
  description: "Reactive IPv6 sur toutes les interfaces via le registre (rollback de net_018)"
  category: "network"
  risk_level: "medium"
