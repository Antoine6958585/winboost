# WinBoost — Privacy Actions (30 definitions)
# Categorie : confidentialite et vie privee Windows
# Risque majoritaire : low/medium, quelques high

# === 1-5 : Telemetrie Windows ===

- id: "privacy_001"
  name: "Disable DiagTrack Service"
  description: "Desactive le service Connected User Experiences and Telemetry (DiagTrack) qui collecte et envoie des donnees de diagnostic a Microsoft."
  category: "privacy"
  risk_level: "medium"
  requires_admin: true
  reversible: true
  execute:
    method: "service_disable"
    params:
      service_name: "DiagTrack"
  rollback:
    method: "service_set_manual"
    params:
      service_name: "DiagTrack"
  keywords:
    fr: ["telemetrie", "diagnostic", "collecte donnees", "diagtrack", "espionnage"]
    en: ["telemetry", "diagnostics", "data collection", "diagtrack", "tracking"]

- id: "privacy_002"
  name: "Disable Customer Experience Improvement Program"
  description: "Desactive le programme CEIP qui envoie des rapports d'utilisation a Microsoft pour ameliorer Windows."
  category: "privacy"
  risk_level: "low"
  requires_admin: true
  reversible: true
  execute:
    method: "registry_set"
    params:
      path: "HKLM\\SOFTWARE\\Microsoft\\SQMClient\\Windows"
      name: "CEIPEnable"
      type: "REG_DWORD"
      value: 0
  rollback:
    method: "registry_set"
    params:
      path: "HKLM\\SOFTWARE\\Microsoft\\SQMClient\\Windows"
      name: "CEIPEnable"
      type: "REG_DWORD"
      value: 1
  keywords:
    fr: ["ceip", "amelioration experience", "rapport utilisation", "telemetrie"]
    en: ["ceip", "customer experience", "usage reporting", "telemetry"]

- id: "privacy_003"
  name: "Disable Feedback Notifications"
  description: "Desactive les notifications de retour d'experience et empeche Windows de demander des commentaires."
  category: "privacy"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "registry_set"
    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Siuf\\Rules"
      name: "NumberOfSIUFInPeriod"
      type: "REG_DWORD"
      value: 0
  rollback:
    method: "registry_delete"
    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Siuf\\Rules"
      name: "NumberOfSIUFInPeriod"
  keywords:
    fr: ["feedback", "retour experience", "commentaires", "notification"]
    en: ["feedback", "notifications", "surveys", "prompts"]

- id: "privacy_004"
  name: "Disable Activity History"
  description: "Desactive la collecte de l'historique d'activite qui enregistre les applications et fichiers utilises."
  category: "privacy"
  risk_level: "low"
  requires_admin: true
  reversible: true
  execute:
    method: "registry_set"
    params:
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\System"
      name: "EnableActivityFeed"
      type: "REG_DWORD"
      value: 0
  rollback:
    method: "registry_delete"
    params:
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\System"
      name: "EnableActivityFeed"
  keywords:
    fr: ["historique activite", "timeline", "activites recentes", "chronologie"]
    en: ["activity history", "timeline", "recent activities", "activity feed"]

- id: "privacy_005"
  name: "Disable Advertising ID"
  description: "Desactive l'identifiant publicitaire unique attribue a chaque utilisateur pour le ciblage publicitaire."
  category: "privacy"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "registry_set"
    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\AdvertisingInfo"
      name: "Enabled"
      type: "REG_DWORD"
      value: 0
  rollback:
    method: "registry_set"
    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\AdvertisingInfo"
      name: "Enabled"
      type: "REG_DWORD"
      value: 1
  keywords:
    fr: ["publicite", "identifiant publicitaire", "ciblage", "ads", "tracking"]
    en: ["advertising", "ad id", "targeting", "ads", "tracking"]

