- id: "privacy_030"
  name: "Disable App Access to Contacts and Calendar"
  description: "Empeche les applications du Microsoft Store d'acceder aux contacts et au calendrier sans autorisation explicite."
  category: "privacy"
  risk_level: "medium"
  requires_admin: true
  reversible: true
  execute:
    method: "powershell"
    params:
      commands:
        - "Set-ItemProperty -Path 'HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppPrivacy' -Name 'LetAppsAccessContacts' -Value 2 -Type DWord -Force"
        - "Set-ItemProperty -Path 'HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppPrivacy' -Name 'LetAppsAccessCalendar' -Value 2 -Type DWord -Force"
  rollback:
    method: "powershell"
    params:
      commands:
        - "Remove-ItemProperty -Path 'HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppPrivacy' -Name 'LetAppsAccessContacts' -ErrorAction SilentlyContinue"
        - "Remove-ItemProperty -Path 'HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppPrivacy' -Name 'LetAppsAccessCalendar' -ErrorAction SilentlyContinue"
  keywords:
    fr: ["contacts", "calendrier", "permissions apps", "acces donnees", "carnet adresses"]
    en: ["contacts", "calendar", "app permissions", "data access", "address book"]
