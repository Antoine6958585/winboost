  category: "system"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "powershell"
    params:
      command: "(Get-WmiObject -Namespace root/WMI -Class WmiMonitorBrightnessMethods).WmiSetBrightness(1, 30)"
  rollback:
    method: "powershell"
    params:
      command: "(Get-WmiObject -Namespace root/WMI -Class WmiMonitorBrightnessMethods).WmiSetBrightness(1, 70)"
  keywords:
