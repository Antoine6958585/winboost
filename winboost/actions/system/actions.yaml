    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
      values:
        - name: "Hidden"
          type: "REG_DWORD"
          data: 2
  keywords:
    fr: ["fichiers caches", "afficher fichiers caches", "dossiers masques", "voir fichiers caches"]
    en: ["hidden files", "show hidden files", "hidden folders", "display hidden"]

- id: "sys_003"
