# WinBoost — Actions: System
# 10 actions de configuration systeme Windows

- id: "sys_001"
  name: "Show File Extensions"
  description: "Displays file extensions in Windows Explorer for all known file types"
  category: "system"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
    method: "registry_set"
    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
      values:
        - name: "HideFileExt"
          type: "REG_DWORD"
          data: 0
  rollback:
    method: "registry_set"
    params:
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
      values:
        - name: "HideFileExt"
          type: "REG_DWORD"
          data: 1
  keywords:
    fr: ["extensions fichiers", "afficher extensions", "voir extensions", "type fichier"]
    en: ["file extensions", "show extensions", "display file types", "unhide extensions"]

- id: "sys_002"
  name: "Show Hidden Files"
  description: "Makes hidden files and folders visible in Windows Explorer"
  category: "system"
  risk_level: "low"
  requires_admin: false
  reversible: true
  execute:
