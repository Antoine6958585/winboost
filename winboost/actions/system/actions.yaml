    params:
      path: "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\Explorer"
      values:
        - name: "DisableSearchBoxSuggestions"
          type: "REG_DWORD"
          data: 1
  rollback:
    method: "registry_delete"
    params:
      path: "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\Explorer"
      values:
        - name: "DisableSearchBoxSuggestions"
  keywords:
    fr: ["bing menu demarrer", "recherche web demarrer", "desactiver bing", "recherche locale"]
    en: ["bing start menu", "disable bing search", "web search start", "local search only"]

